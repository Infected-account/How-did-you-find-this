<!DOCTYPE html>
<html>
<head>
  <title>log_0686</title>

  <style>
    body {
      background-color: black;
      color: #ff2a2a;
      font-family: monospace;
      padding: 40px;
    }

    h1 {
      text-align: center;
      letter-spacing: 3px;
    }

    .entry {
      margin-top: 40px;
      white-space: pre-line;
    }

    .flicker {
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    
    #unlockBtn {
      display: block;
      margin: 60px auto;
      background: black;
      color: #550000;
      border: 1px solid #220000;
      padding: 10px 20px;
      cursor: pointer;
      font-family: monospace;
    }

    #unlockBtn:hover {
      color: red;
      border-color: red;
    }

    
    #log {
      display: none;
    }
  </style>
</head>

<body>

  <h1 class="flicker">[LOG_0686]</h1>

  
  <button id="unlockBtn" onclick="unlockLogs()">continue</button>

  <div id="log"></div>

  <!-- audio -->
  <audio id="creepyAudio" src="audio/creepy.mp3"></audio>

  <script>
   
    const entries = [
`date: unknown
journal entry 1
"it's reacting when i go through the pages. i guess it doesn't like when i continue on."`,

`date: unknown
journal entry 2
"This infection is spreading fast, theres gotta be a way to stop it. i remember it all starting, YouTube and everything else like it got hacked. now, every time you post, you get infected. i don't know how, but it's fatal"`,

`date: unknown
journal entry 3
"Dangit! it already claimed some victims! to my understanding, it already got yub, markiplier, and jmancurly. how long will it be until we find a way to stop it? "`,

`date: unknown
journal entry 4
"new disturbing discovery: First, the good news. jimmyhere, stanleymov, and technoblade are still alive. Now the discovery. It took sr.pelo and he is now missing. i'll try to gather the people that are still alive and try to find survivors."`
    ];

    const logContainer = document.getElementById("log");

    let entryIndex = 0;

    function typeEntry(text, callback) {
      let div = document.createElement("div");
      div.className = "entry";
      logContainer.appendChild(div);

      let i = 0;

      function typeChar() {
        if (i < text.length) {
          div.innerHTML += text.charAt(i);
          i++;
          setTimeout(typeChar, 25);
        } else {
          if (callback) callback();
        }
      }

      typeChar();
    }

    function startLogs() {
      if (entryIndex < entries.length) {
        typeEntry(entries[entryIndex], () => {
          entryIndex++;
          setTimeout(startLogs, 1000);
        });
      }
    }

    
    const script = [
      { time: 0.5, word: "date:" },
      { time: 1.0, word: "unknown" },
      { time: 2.0, word: "journal" },
      { time: 2.4, word: "entry" },
      { time: 2.8, word: "1" },
      { time: 4.0, word: "\"it's" },
      { time: 4.5, word: "reacting" },
      { time: 5.0, word: "when" },
      { time: 5.3, word: "i" },
      { time: 5.6, word: "go" }
    ];

    const audio = document.getElementById("creepyAudio");

    let currentIndex = 0;

    
    let syncedDiv = document.createElement("div");
    syncedDiv.className = "entry";
    syncedDiv.style.display = "none";
    logContainer.appendChild(syncedDiv);

    
    audio.addEventListener("timeupdate", () => {
      while (
        currentIndex < script.length &&
        audio.currentTime >= script[currentIndex].time
      ) {
        syncedDiv.innerHTML += script[currentIndex].word + " ";
        currentIndex++;
      }
    });

    
    function unlockLogs() {
      document.getElementById("unlockBtn").style.display = "none";
      document.getElementById("log").style.display = "block";

      syncedDiv.style.display = "block"; 

      const audio = document.getElementById("creepyAudio");
      audio.volume = 0.7;
      audio.play();

      // ❌ startLogs();  
    }
  </script>

</body>
</html>
