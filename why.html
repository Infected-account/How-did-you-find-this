<!DOCTYPE html>
<html>
<head>
  <title>log_0686</title>

  <style>
    body {
      background-color: black;
      color: #ff2a2a;
      font-family: monospace;
      padding: 40px;
    }

    h1 {
      text-align: center;
      letter-spacing: 3px;
    }

    .entry {
      margin-top: 40px;
      white-space: pre-line;
    }

    .flicker {
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    #unlockBtn {
      display: block;
      margin: 60px auto;
      background: black;
      color: #550000;
      border: 1px solid #220000;
      padding: 10px 20px;
      cursor: pointer;
      font-family: monospace;
    }

    #unlockBtn:hover {
      color: red;
      border-color: red;
    }

    #log {
      display: none;
    }
  </style>
</head>

<body>

  <h1 class="flicker">[LOG_0686]</h1>

  <button id="unlockBtn" onclick="unlockLogs()">continue</button>

  <div id="log"></div>

  <script>

    const entries = [
`date: unknown
journal entry 1
"it's reacting when i go through the pages. i guess it doesn't like when i continue on."`,

`date: unknown
journal entry 2
"This infection is spreading fast. theres gotta be a way to stop it. i remember it all starting. Youtube, and everything else like it all got hacked. Now, every time you post, you get infected. i don't know how. but it's fatal."`
    ];

    const logContainer = document.getElementById("log");

    function typeText(element, text, speed = 35, callback) {
      let i = 0;

      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        } else if (callback) {
          callback();
        }
      }

      typing();
    }

    function typeEntriesSequentially(index = 0) {
      if (index >= entries.length) return;

      let div = document.createElement("div");
      div.className = "entry";
      logContainer.appendChild(div);

      typeText(div, entries[index], 35, () => {
        setTimeout(() => {
          typeEntriesSequentially(index + 1);
        }, 800); // pause between entries
      });
    }

    function unlockLogs() {
      document.getElementById("unlockBtn").style.display = "none";
      document.getElementById("log").style.display = "block";

      typeEntriesSequentially();
    }

  </script>

</body>
</html>
