<body>

<p id="text"></p>

<script>
const message = "hello! note from the guy that created this website, thanks for watching my youtube videos! it really means alot to me and your helping the infection grow (in a good way). please subscribe though, that would really help! thanks though for watching da videos <3
i don’t think i say this enough, but… i really mean it when i say thank you. every view, every second you spend watching, every time you come back… it all adds up more than you probably realize.
this started as just something small i wanted to try, and honestly i didn’t expect anyone to even care. but you did. you showed up. and that’s kinda everything.
sometimes it’s easy to feel like you’re just shouting into nothing, but knowing there’s someone on the other side of the screen makes it feel real. it makes this feel real.
so yeah… thank you for being here. for sticking around. for giving this weird little project a chance.
you didn’t have to, but you did… and that means a lot more than i can really put into words.
you’re part of this now. ";

let i = 0;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

typeWriter();
</script>
