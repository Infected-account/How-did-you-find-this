    background: black;

}

<body>

<p id="text"></p>

<script>
const message = "hello, this a note from the person that is making the youtube infection. let me get credit where it is due, thank you jimmyhere for making me laugh and thank you stanleyMOV for being my motivation to keep going every day. you guys help me get my mind of my stressful schedule lol. but really thank you viewers for being here and giving my little series a chance.  ";

let i = 0;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

typeWriter();
</script>
